repos:
  ### Supply Chain Security
  - repo: local
    hooks:
      - id: enforce-sha-pins
        name: Enforce SHA pinning in pre-commit config
        entry: '^\s+rev: (?![\x27"]?[A-Fa-f0-9]{40}[\x27"]?(\s+#|$))'
        language: pygrep
        files: ^\.pre-commit-config\.yaml$
        description: "Fails if a 'rev:' value is not a 40-character hex SHA."
  ### General Hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0
    hooks:
      - id: check-added-large-files
      - id: no-commit-to-branch
        args: [ '--branch', 'main' ]

  ### Github Action Hooks
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 13614ab716a3113145f1294ed259d9fbe5678ff3  # 0.37.1
    hooks:
      - id: check-github-workflows
        args: [ "--verbose" ]

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # v1.7.12
    hooks:
      - id: actionlint
        files: ^\.github/workflows/

  ### Terraform Hooks
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: d0e12caebb2ab0ee8bf98181c8bfe9702bca103d  # v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        exclude: ^examples/
      - id: terraform_providers_lock
        args:
          - --hook-config=--mode=only-check-is-current-lockfile-cross-platform
      - id: terraform_tflint
        verbose: true
        args:
          - --hook-config=--delegate-chdir
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
          - --args=--fix
      - id: terraform_docs
        exclude: ^examples/
        args:
          - --hook-config=--add-to-existing-file=true     # Boolean. true or false
          - --hook-config=--create-file-if-not-exist=true # Boolean. true or false
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: ea2eb407b4cbce87cf0d502f36578950494f5ac9  # v1.23.1
    hooks:
      - id: zizmor
        files: ^\.github/(workflows|actions)/
